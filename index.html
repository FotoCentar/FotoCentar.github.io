    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#0f0f0f;
            color:#fff;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        body::before{
            content:"";
            position:absolute;
            inset:0;
            background:url("background.jpg") center/cover no-repeat;
            opacity:.18;
        }

        .container{
            position:relative;
            z-index:2;
            text-align:center;
            max-width:700px;
            padding:40px;
        }

        h1{
            font-size:4rem;
            letter-spacing:4px;
            text-transform:uppercase;
            margin-bottom:15px;
        }

        .line{
            width:90px;
            height:3px;
            background:#fff;
            margin:0 auto 30px;
            opacity:.8;
        }

        p{
            color:#d9d9d9;
            font-size:1.1rem;
            line-height:1.8;
            margin-bottom:40px;
        }

        .loader{
            font-size:3rem;
            margin-bottom:25px;
        }

        .loader i{
            animation:spin 1.2s linear infinite;
        }

        @keyframes spin{
            from{transform:rotate(0deg);}
            to{transform:rotate(360deg);}
        }

        .footer{
            color:#9b9b9b;
            font-size:.95rem;
            letter-spacing:1px;
        }
    </style>
